<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Reserve Your Order | Ameer Global INC.</title>
  <meta name="description" content="Reserve your favourite products with Ameer Global. No upfront payment — we confirm availability and follow up directly."/>
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon.png"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --brand-900:#1f4ea5;
      --brand-700:#4472cf;
      --ink-900:#182a4d;
      --ink-700:#4e6288;
      --ink-500:#7787a5;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Outfit',sans-serif;
      color:var(--ink-900);
      background:
        radial-gradient(940px 480px at 94% -12%,rgba(84,125,221,.16),transparent 60%),
        radial-gradient(800px 420px at -20% 10%,rgba(31,78,165,.12),transparent 58%),
        linear-gradient(180deg,#f5f8ff,#f9fbff 48%,#f4f7fd);
    }
    h1,h2,h3{font-family:'Fraunces',serif;font-weight:600}
    .frost{
      background:rgba(255,255,255,.8);
      border:1px solid rgba(31,78,165,.12);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      box-shadow:0 22px 44px rgba(17,43,94,.08);
    }
    .reveal{opacity:0;transform:translateY(12px);animation:reveal .55s ease forwards}
    .d1{animation-delay:.08s}
    .d2{animation-delay:.16s}
    @keyframes reveal{to{opacity:1;transform:translateY(0)}}
    .pill{border:1px solid rgba(31,78,165,.16);background:#fff}
    .cta{
      background:linear-gradient(140deg,var(--brand-900),var(--brand-700));
      color:#fff;
      box-shadow:0 16px 28px rgba(31,78,165,.2);
    }
    .qty-btn{width:42px;height:42px;border:1px solid rgba(31,78,165,.18);background:#fff;border-radius:.8rem;font-size:1.2rem;font-weight:700;color:#204ca0}
  </style>
</head>
<body>
  <nav class="sticky top-0 z-50 border-b border-[#1f4ea5]/10 bg-white/85 backdrop-blur">
    <div class="mx-auto flex max-w-[1260px] items-center justify-between px-6 py-4 md:px-10">
      <a href="/"><img alt="Ameer Global Logo" src="/assets/logo-transparent-final.png" class="h-[52px] w-auto"/></a>
      <a href="/products/" class="rounded-xl border border-[#1f4ea5]/16 bg-white px-4 py-2 text-[.74rem] font-bold uppercase tracking-[.14em] text-[#1f4ea5]">Back to products</a>
    </div>
  </nav>

  <main class="mx-auto max-w-[1260px] px-6 pb-20 pt-8 md:px-10">
    <section class="frost reveal rounded-[1.8rem] p-6 md:p-8">
      <div class="grid gap-7 lg:grid-cols-[1.1fr_.9fr]">
        <div>
          <h1 class="mt-2 text-[clamp(2rem,5vw,3.9rem)] leading-[1.03] text-[#2d5ebf]">Reserve Now,<br/>Pay Later</h1>
        </div>
        <div class="rounded-[1.4rem] border border-[#1f4ea5]/10 bg-gradient-to-b from-[#f7faff] to-[#edf3ff] p-5">
          <div class="text-[.66rem] font-bold uppercase tracking-[.16em] text-[#6f86b0]">How it works</div>
          <ol class="mt-3 space-y-3 text-sm text-[#50658c]">
            <li><strong class="text-[#1d3f86]">1.</strong> Give info</li>
            <li><strong class="text-[#1d3f86]">2.</strong> Confirm quantity</li>
            <li><strong class="text-[#1d3f86]">3.</strong> We will contact you once the shipment arrives</li>
          </ol>
        </div>
      </div>
    </section>

    <section class="mt-8 grid gap-8 lg:grid-cols-[.9fr_1.1fr]">
      <article class="frost reveal d1 rounded-[1.8rem] p-6 md:p-8">
        <img id="product-image" src="/assets/new-mango-photo.png" alt="Product" class="h-[240px] w-full rounded-2xl object-cover"/>
        <div class="mt-5">
          <div class="text-[.66rem] font-bold uppercase tracking-[.15em] text-[#6f86b0]">Selected Product</div>
          <h2 id="product-name" class="mt-2 text-[1.7rem] text-[#16305d]">Product</h2>
          <div class="mt-4 flex flex-wrap gap-2 text-[.7rem] font-bold text-[#4f6286] uppercase tracking-[.1em]">
            <span id="summary-unit" class="w-fit rounded-xl border border-[#1f4ea5]/10 bg-[#f7faff] px-3 py-1.5">Trade pack</span>
            <span id="summary-origin" class="w-fit rounded-xl border border-[#1f4ea5]/10 bg-[#f7faff] px-3 py-1.5">Pakistan</span>
          </div>
        </div>
        <div class="mt-5 rounded-xl border border-[#1f4ea5]/12 bg-white p-4">
          <div class="text-[.66rem] font-bold uppercase tracking-[.15em] text-[#6f86b0]">Quantity</div>
          <div class="mt-3 flex items-center gap-3">
            <button id="qty-minus" type="button" class="qty-btn">-</button>
            <input id="quantity" type="number" min="1" max="1000" value="1" class="w-full rounded-xl border border-[#1f4ea5]/14 px-4 py-3 text-center text-sm font-semibold"/>
            <button id="qty-plus" type="button" class="qty-btn">+</button>
          </div>
        </div>
      </article>

      <article class="frost reveal d2 rounded-[1.8rem] p-6 md:p-8">
        <form id="reserve-form" class="space-y-5">
          <div class="grid gap-5 md:grid-cols-2">
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="name">Full Name</label>
              <input id="name" required type="text" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="email">Email</label>
              <input id="email" required type="email" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="phone">Phone</label>
              <input id="phone" required type="tel" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="company">Company (Optional)</label>
              <input id="company" type="text" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="marketCity">City</label>
              <input id="marketCity" required type="text" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div>
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="marketCountry">Country</label>
              <input id="marketCountry" required type="text" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="window">Preferred Delivery Window</label>
              <input id="window" required type="text" placeholder="e.g. July 2026, Week 2" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base"/>
            </div>
            <div class="md:col-span-2">
              <label class="mb-2 block text-[.68rem] font-bold uppercase tracking-[.14em] text-[#60779f]" for="notes">Notes</label>
              <textarea id="notes" rows="4" class="w-full rounded-xl border border-[#1f4ea5]/14 bg-white px-4 py-3.5 text-base" placeholder="Any special requirements, packaging preferences, or questions."></textarea>
            </div>
          </div>

          <button type="submit" id="submit-reserve" class="cta w-full rounded-xl px-6 py-4 text-[.78rem] font-bold uppercase tracking-[.14em]">Submit Reserve Request</button>
          <p id="reserve-status" class="mt-3 text-center text-sm text-[#596f96]">No payment required. We'll follow up with you.</p>
        </form>
      </article>
    </section>
  </main>

  <script>
    const productCatalog = {
      'Sindhri Mangoes': { unit: '6kg box', origin: 'Sindh, Pakistan', image: '/assets/sindhri-mangoes.png' },
      'Anwar Ratol Mangoes': { unit: '4kg box', origin: 'Punjab, Pakistan', image: '/assets/anwar-ratol-mangoes.png' },
      'Chaunsa Mangoes': { unit: '5kg box', origin: 'Multan, Pakistan', image: '/assets/chaunsa-mangoes.png' },
      'Chaunsa Mango Premium Box': { unit: '5kg box', origin: 'Multan, Pakistan', image: '/assets/chaunsa-mangoes.png' },
      'Anwar Ratol Mango Reserve': { unit: '4kg box', origin: 'Punjab, Pakistan', image: '/assets/anwar-ratol-mangoes.png' },
      'Sindhri Mango Estate Selection': { unit: '6kg box', origin: 'Sindh, Pakistan', image: '/assets/sindhri-mangoes.png' },
      'Himalayan Salt': { unit: 'Bulk or retail packs', origin: 'Khewra, Pakistan', image: '/assets/himalayan-salt.png' },
      'EcoWare Naturals': { unit: 'Trade case', origin: 'Pakistan', image: '/assets/eco-utensils.png' },
      'De-Icing Salt': { unit: 'Bulk pallet', origin: 'Pakistan', image: '/assets/deicing-salt.png' }
    };

    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || 'Ameer Global Product';
    const intent = params.get('intent') || 'reserve';
    const qtyField = document.getElementById('quantity');
    const status = document.getElementById('reserve-status');
    const submitButton = document.getElementById('submit-reserve');

    const profile = productCatalog[product] || { unit: 'Trade pack', origin: 'Global', image: '/assets/new-mango-photo.png' };

    document.getElementById('product-name').textContent = product;
    document.getElementById('product-image').src = profile.image;
    
    if (document.getElementById('summary-unit')) document.getElementById('summary-unit').textContent = profile.unit;
    if (document.getElementById('summary-origin')) document.getElementById('summary-origin').textContent = profile.origin;

    document.getElementById('qty-minus').addEventListener('click', () => {
      const current = Math.max(1, Number.parseInt(qtyField.value || '1', 10) || 1);
      qtyField.value = String(Math.max(1, current - 1));
    });

    document.getElementById('qty-plus').addEventListener('click', () => {
      const current = Math.min(1000, Number.parseInt(qtyField.value || '1', 10) || 1);
      qtyField.value = String(Math.min(1000, current + 1));
    });

    document.getElementById('reserve-form').addEventListener('submit', async (event) => {
      event.preventDefault();

      submitButton.disabled = true;
      submitButton.textContent = 'Submitting...';
      status.textContent = 'Sending reserve request...';

      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        subject: `Reserve Request: ${product}`,
        message: [
          `Product: ${product}`,
          `Quantity: ${qtyField.value.trim()}`,
          `Phone: ${document.getElementById('phone').value.trim()}`,
          `Company: ${document.getElementById('company').value.trim() || 'N/A'}`,
          `City: ${document.getElementById('marketCity').value.trim()}`,
          `Country: ${document.getElementById('marketCountry').value.trim()}`,
          `Delivery window: ${document.getElementById('window').value.trim()}`,
          `Notes: ${document.getElementById('notes').value.trim()}`
        ].join('\n'),
        source: 'reserve-page',
        product,
        intent
      };

      try {
        const response = await fetch('/api/reserve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (!response.ok) {
          status.textContent = result.error || 'Unable to submit reserve request.';
          submitButton.disabled = false;
          submitButton.textContent = 'Submit reserve request';
          return;
        }

        status.textContent = result.message || 'Reserve request sent.';
        submitButton.disabled = false;
        submitButton.textContent = 'Submit reserve request';
      } catch (error) {
        status.textContent = 'Network error. Please try again.';
        submitButton.disabled = false;
        submitButton.textContent = 'Submit reserve request';
      }
    });
  </script>
</body>
</html>
