<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | Ameer Global</title>
  <style>
    :root{--green:#1f4f3b;--gold:#d4a017;--ink:#1f2f2a;--cream:#faf7ef}
    body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(1100px 420px at 90% -10%,rgba(212,160,23,.15),transparent 60%),var(--cream);color:var(--ink)}
    .top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:linear-gradient(135deg,var(--green),#2b6b50);color:#fff}
    .top a{color:#fff;text-decoration:none;margin-right:12px;font-weight:700}
    .logout{background:#fff;border:0;color:var(--green);border-radius:9px;padding:8px 12px;font-weight:700;cursor:pointer}
    .hero{padding:18px 16px 0}
    .hero h1{margin:0;font-size:1.7rem;color:var(--green)}
    .hero p{margin:6px 0 0;color:#5b6f67}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;padding:16px}
    .card{background:#fff;border:1px solid #e1dccf;border-radius:14px;padding:15px;box-shadow:0 12px 24px rgba(31,47,42,.06)}
    .label{font-size:.73rem;text-transform:uppercase;color:#718078;font-weight:700;letter-spacing:.06em}
    .value{font-size:1.6rem;font-weight:800;color:var(--green);margin-top:4px}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}
    th,td{border:1px solid #ece6d9;padding:8px;font-size:.9rem;text-align:left;vertical-align:top}
    th{background:#f5efe2}
    .wrap{padding:0 16px 16px}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.74rem;font-weight:700;background:#eef6f2;color:#2a6b52}
    .warn{background:#fff3e1;color:#8a5e00}
    .bad{background:#fdeceb;color:#a3342c}
  </style>
</head>
<body>
  <div class="top">
    <div>
      <a href="/admin/">Dashboard</a>
      <a href="/admin/orders/">Orders</a>
      <a href="/admin/inventory/">Inventory</a>
    </div>
    <button class="logout" id="logout-btn">Logout</button>
  </div>
  <div class="hero">
    <h1>Ameer Global Admin Dashboard</h1>
    <p id="session-line">Orders, revenue, fulfillment, inventory, and live backend connection health.</p>
  </div>
  <div class="grid" id="stats"></div>
  <div class="wrap">
    <h3>Connections</h3>
    <table>
      <tbody id="diag-body"></tbody>
    </table>
  </div>
  <div class="wrap">
    <h3>Recent Orders</h3>
    <table>
      <thead>
        <tr><th>ID</th><th>Customer</th><th>Mango</th><th>Qty</th><th>Amount</th><th>Status</th><th>Date</th></tr>
      </thead>
      <tbody id="recent-body"></tbody>
    </table>
  </div>
  <div class="wrap">
    <h3>All Links</h3>
    <table>
      <tbody id="links-body"></tbody>
    </table>
  </div>
  <script>
    async function ensureSession() {
      const res = await fetch('/api/admin/session');
      const data = await res.json();
      if (!data.authenticated) window.location.href = '/admin/login/';
      if (data.expiresAt) {
        const dt = new Date(Number(data.expiresAt));
        document.getElementById('session-line').textContent = `Authenticated as ${data.email}. Session expires: ${dt.toLocaleString()}`;
      }
    }

    function statCard(label, value) {
      return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function setError(message) {
      document.getElementById('stats').innerHTML = `<div class="card"><div class="label">Dashboard Error</div><div class="value" style="font-size:1rem;color:#9f2b1f">${message}</div></div>`;
    }

    async function loadDiagnostics() {
      const res = await fetch('/api/admin/diagnostics');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed loading diagnostics');
      function statusPill(ok, text) {
        if (ok === true) return `<span class="pill">OK</span> ${text || ''}`.trim();
        if (ok === false) return `<span class="pill bad">Issue</span> ${text || ''}`.trim();
        return `<span class="pill warn">N/A</span> ${text || ''}`.trim();
      }
      const rows = [];
      rows.push(['Admin login code', statusPill(data.auth.loginCodeConfigured, data.auth.loginCodeConfigured ? 'Configured' : 'Missing')]);
      rows.push(['Supabase configured', statusPill(data.supabase.configured, data.supabase.configured ? 'Configured' : 'Missing')]);
      rows.push(['Supabase URL format', statusPill(data.supabase.urlValid, data.supabase.urlValid ? 'Valid' : 'Invalid URL')]);
      rows.push(['Orders table', statusPill(data.supabase.ordersTableReachable, data.supabase.ordersTableReachable ? 'Reachable' : (data.supabase.ordersTableError || 'Error'))]);
      rows.push(['Inventory table', statusPill(data.supabase.inventoryTableReachable, data.supabase.inventoryTableReachable ? 'Reachable' : (data.supabase.inventoryTableError || 'Error'))]);
      rows.push(['Stripe secret key', statusPill(data.stripe.configured, data.stripe.configured ? 'Configured' : 'Missing')]);
      rows.push(['Stripe webhook secret', statusPill(data.stripe.webhookSecretConfigured, data.stripe.webhookSecretConfigured ? 'Configured' : 'Missing')]);
      document.getElementById('diag-body').innerHTML = rows.map(([k,v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('');
    }

    async function loadDashboard() {
      const res = await fetch('/api/admin/dashboard');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed loading dashboard');
      document.getElementById('stats').innerHTML = [
        statCard('Total Orders', data.totalOrders),
        statCard('Total Revenue (CAD)', Number(data.totalRevenue || 0).toFixed(2)),
        statCard('Pending Orders', data.pendingOrders),
        statCard('Fulfilled Orders', data.fulfilledOrders),
        statCard('Total Inventory Left', data.totalInventoryRemaining)
      ].join('');

      const invCards = (data.inventory || []).map((item) =>
        statCard(`Inventory: ${item.mango_type}`, item.remaining_stock)
      ).join('');
      document.getElementById('stats').insertAdjacentHTML('beforeend', invCards);

      document.getElementById('recent-body').innerHTML = (data.recentOrders || []).map((row) => `
        <tr>
          <td>${row.id || ''}</td>
          <td>${row.customer_name || ''}</td>
          <td>${row.mango_type || ''}</td>
          <td>${row.quantity || ''}</td>
          <td>${row.amount_total || ''}</td>
          <td>${row.fulfillment_status || ''}</td>
          <td>${new Date(row.created_at).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    async function loadLinks() {
      const res = await fetch('/api/admin/links');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed loading links');
      const rows = [];
      for (const p of (data.pages || [])) rows.push(['Page', p]);
      for (const a of (data.apis || [])) rows.push(['API', a]);
      document.getElementById('links-body').innerHTML = rows.map(([k,v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('');
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login/';
    });

    ensureSession()
      .then(async () => {
        await loadDashboard();
        await loadDiagnostics();
        await loadLinks();
      })
      .catch((err) => {
        setError(err.message || 'Unable to load admin dashboard.');
      });
  </script>
</body>
</html>
