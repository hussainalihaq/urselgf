<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Inventory | Ameer Global</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#faf7ef;color:#1f2f2a}
    .top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:#1f4f3b;color:#fff}
    .top a{color:#fff;text-decoration:none;margin-right:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;padding:16px}
    .card{background:#fff;border:1px solid #e1dccf;border-radius:12px;padding:14px}
    .row{font-size:.9rem;margin:6px 0}
    input{width:100%;padding:8px;border:1px solid #d9d5c8;border-radius:8px}
    button{margin-top:8px;padding:8px 10px}
  </style>
</head>
<body style="visibility:hidden">
  <div class="top">
    <div>
      <a href="/admin/">Dashboard</a>
      <a href="/admin/orders/">Orders</a>
      <a href="/admin/inventory/">Inventory</a>
    </div>
    <button id="logout-btn">Logout</button>
  </div>
  <div id="cards" class="grid"></div>
  <div id="inventory-msg" style="padding:0 16px 16px;font-size:.9rem;color:#9f2b1f"></div>
  <script>
    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error(`Non-JSON response from ${url}`);
      }
      if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
      return data;
    }

    async function ensureSession() {
      const data = await fetchJson('/api/admin/session');
      if (!data.authenticated) window.location.href = '/admin/login/';
    }

    async function updateInventory(id, action) {
      const amount = document.getElementById(`amount-${id}`).value;
      const low = document.getElementById(`low-${id}`).value;
      const remaining = document.getElementById(`remaining-${id}`).value;
      await fetchJson('/api/admin/inventory-update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id,
          action,
          amount,
          remaining_stock: remaining,
          low_stock_threshold: low
        })
      });
      document.getElementById('inventory-msg').textContent = 'Inventory updated.';
      await loadInventory();
    }

    async function loadInventory() {
      const data = await fetchJson('/api/admin/inventory');
      const items = (data.inventory || []).slice(0, 3);
      document.getElementById('cards').innerHTML = items.map((item) => `
        <div class="card">
          <h3>${item.mango_type}</h3>
          <div class="row"><strong>Fixed size:</strong> ${item.fixed_size || ''}</div>
          <div class="row"><strong>Fixed price:</strong> CAD ${item.fixed_price || ''}</div>
          <div class="row"><strong>Starting stock:</strong> ${item.starting_stock || 0}</div>
          <div class="row"><strong>Sold quantity:</strong> ${item.sold_quantity || 0}</div>
          <div class="row"><strong>Remaining stock:</strong> ${item.remaining_stock || 0}</div>
          <div class="row"><strong>Low stock alert:</strong> ${item.low_stock_threshold || 0}</div>
          <label>Set remaining stock</label>
          <input id="remaining-${item.id}" type="number" value="${item.remaining_stock || 0}"/>
          <label>Change amount (+/-)</label>
          <input id="amount-${item.id}" type="number" value="0"/>
          <label>Low stock threshold</label>
          <input id="low-${item.id}" type="number" value="${item.low_stock_threshold || 10}"/>
          <button onclick="updateInventory('${item.id}','set')">Set Stock</button>
          <button onclick="updateInventory('${item.id}','increase')">Increase Stock</button>
          <button onclick="updateInventory('${item.id}','decrease')">Decrease Stock</button>
        </div>
      `).join('');
    }

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/api/admin/logout', { method: 'POST' });
      window.location.href = '/admin/login/';
    });

    ensureSession()
      .then(() => {
        document.body.style.visibility = 'visible';
        return loadInventory();
      })
      .catch((err) => {
        document.body.style.visibility = 'visible';
        document.getElementById('inventory-msg').textContent = err.message || 'Unable to load inventory.';
      });
  </script>
</body>
</html>
